# Default project configuration. Schema: solarflare/config.py (pydantic, extra keys forbidden).
# Convention: all times are UTC, written as ISO-8601 naive strings.

project:
  name: solarflare-mvp
  seed: 1337

paths:
  data_root: data
  cache_dir: data/cache
  outputs_dir: outputs
  experiment_log: outputs/experiments.csv

study:
  # Walking-skeleton target: one well-instrumented AR with a clean X-class event.
  mvp_window: ar11158_feb2011
  # Initial study scope: well-documented Cycle 24/25 ARs + one quiet-Sun window.
  # `harp` = JSOC HARPNUM for hmi.sharp_cea_720s cutouts. All values verified
  # 2026-06-11 against the official JSOC mapping (`solarflare resolve-harps`):
  #   http://jsoc.stanford.edu/doc/data/hmi/harpnum_to_noaa/all_harps_with_noaa_ars.txt
  windows:
    - name: ar11158_feb2011
      start: 2011-02-12T00:00:00
      end: 2011-02-18T00:00:00
      kind: active
      targets:
        - noaa: 11158
          harp: 377
          notes: "First X-class flare of Cycle 24 (X2.2 on 2011-02-15); standard SHARP benchmark AR."
    - name: ar11429_mar2012
      start: 2012-03-04T00:00:00
      end: 2012-03-10T00:00:00
      kind: active
      targets:
        - noaa: 11429
          harp: 1449
          notes: "Major March 2012 storms; X5.4 on 2012-03-07."
    - name: ar12192_oct2014
      start: 2014-10-18T00:00:00
      end: 2014-10-27T00:00:00
      kind: active
      targets:
        - noaa: 12192
          harp: 4698
          notes: "Largest AR of Cycle 24; many X flares (e.g. X3.1 on 2014-10-24), notably CME-poor."
    - name: ar12673_sep2017
      start: 2017-09-03T00:00:00
      end: 2017-09-10T00:00:00
      kind: active
      targets:
        - noaa: 12673
          harp: 7115
          notes: "X9.3 on 2017-09-06 and X8.2 on 2017-09-10; most intense flares of Cycle 24."
    - name: quiet_dec2019
      start: 2019-12-01T00:00:00
      end: 2019-12-15T00:00:00
      kind: quiet
      targets: []              # deep solar minimum; negative/contrast window
    - name: ar13664_may2024
      start: 2024-05-06T00:00:00
      end: 2024-05-15T00:00:00
      kind: active
      targets:
        - noaa: 13664
          harp: 11149
          notes: "Cycle 25 'Gannon storm' source region; X-flare series incl. X8.7 on 2024-05-14."

data:
  aia_channels: [94, 131, 171, 193, 211, 304, 1600, 1700]  # Angstrom
  hmi_sharp_series: hmi.sharp_cea_720s
  hmi_segments: [magnetogram, continuum]   # LOS magnetogram + continuum from the CEA series
  aia_euv_series: aia.lev1_euv_12s
  aia_uv_series: aia.lev1_uv_24s           # 1600/1700 A
  hmi_cadence_seconds: 3600               # hourly SHARP subsample (was 720); ~5x fewer files,
                                          # forecast features resample to 60 min anyway
  aia_cadence_seconds: 3600                # hourly: features are hourly anyway (bulk-run lever)
  aia_match_tolerance_seconds: 1800        # max |AIA - HMI| timestamp gap when stacking
  cutout_pad_arcsec: 40                    # padding around the HARP box for AIA cutouts
  sample_cadence_minutes: 60               # per-AR feature time-series cadence (Phase C)

qa:
  max_nan_fraction: 0.5     # flag frames with more missing pixels than this
  min_coverage: 0.6         # flag reprojected frames covering less of the CEA grid

detect:
  bootstrap_cadence_hours: 6      # label rows + full-disk frame cadence
  fulldisk_series: hmi.m_720s
  fulldisk_segment: magnetogram
  rebin_scale: 0.25               # JSOC-side rebin: 4096 -> 1024 px (verified live)
  image_clip_gauss: 300           # +/- clip for 8-bit PNG conversion
  min_box_arcsec: 20              # drop degenerate HARP boxes
  yolo_model: data/weights/yolo26n.pt  # pretrained nano model (transfer learning; YOLO26 = NMS-free e2e)
  yolo_imgsz: 640
  yolo_epochs: 40
  # Window-blocked splits: train on Cycle-24 windows + quiet negatives,
  # validate on Sep 2017, hold out Cycle-25 May 2024 for the gate report.
  train_windows: [ar11158_feb2011, ar11429_mar2012, ar12192_oct2014, quiet_dec2019]
  val_windows: [ar12673_sep2017]
  test_windows: [ar13664_may2024]

segment:
  # Pluggable Segmenter (solarflare.detect.segmenter registry); one-line swap.
  #   threshold | unet | surya | sam2   (unet needs `solarflare train-unet` first;
  #   surya/sam2 are stubs that raise with setup guidance -- need a GPU + weights).
  model: unet
  spot_threshold: 0.85            # continuum < 0.85 x quiet-Sun median => sunspot
  bfield_threshold_gauss: 100     # |B_los| > 100 G => active pixel
  min_region_pixels: 64
  morph_radius_px: 2
  # U-Net upgrade: trained on the threshold masks as pseudo-labels,
  # time-blocked train/val split per sample (tail frames held out).
  unet_encoder: resnet18
  unet_pretrained: true           # ImageNet encoder init (downloaded on first run)
  unet_epochs: 20
  unet_lr: 0.001
  unet_batch_size: 8
  unet_tile_px: 224               # random-crop size; must be a multiple of 32
  unet_crops_per_epoch: 256
  unet_val_fraction: 0.2
  unet_prob_threshold: 0.5
  unet_weights: outputs/segment/unet/unet_best.pt

track:
  iou_threshold: 0.2              # min rotation-compensated IoU to link boxes
  max_gap_frames: 2               # tolerate this many missed frames before retiring

features:
  min_valid_fraction: 0.8   # min fraction of finite cells in a sequence window
  dataset_version: v1

forecast:
  lookback_hours: 24           # feature history fed to the model
  lead_hours: 24               # forecast horizon; features end strictly before this window
  flare_class_threshold: M1.0  # positive label: >= M1.0 within lead window
  bin_hours: 24                # bin size for the climatological base rate

geometry:
  max_cm_longitude_deg: 65     # restrict ARs to +/-65 deg of central meridian

split:
  strategy: time_blocked       # time_blocked | by_rotation  (never random shuffle)
  n_folds: 5
  embargo_hours: 48            # gap between train/test blocks to kill autocorrelation leakage

climatology:
  # Reference period for the base-rate baseline. One full year at Cycle 24 maximum;
  # the rate is period-dependent — widen this when the study scope grows.
  start: 2014-01-01T00:00:00
  end: 2015-01-01T00:00:00
