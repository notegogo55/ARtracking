name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync environment (locked)
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check .
      - name: Tests (offline fixtures only - no network, no live downloads)
        run: uv run pytest -q
